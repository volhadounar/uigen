name: Generate PR Description

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  generate-description:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Generate diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }} > diff.txt
          head -c 12000 diff.txt > trimmed_diff.txt

      - name: Read prompt and prepare input
        id: prompt
        run: |
          PROMPT=$(cat .github/PR_DESCRIPTION_PROMPT.md)
          DIFF=$(cat trimmed_diff.txt)

          FULL_PROMPT="$PROMPT

PR title: ${{ github.event.pull_request.title }}

Git diff:
$DIFF"

          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "$FULL_PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Call Claude API
        id: claude
        run: |
          RESPONSE=$(curl https://api.anthropic.com/v1/messages \
            -s \
            -H "x-api-key: ${{ secrets.CLAUDE_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "{
              \"model\": \"claude-3-haiku-20240307\",
              \"max_tokens\": 800,
              \"messages\": [{
                \"role\": \"user\",
                \"content\": $(jq -Rs . <<< "${{ steps.prompt.outputs.prompt }}")
              }]
            }")

          echo "$RESPONSE" > response.json

          DESCRIPTION=$(jq -r '.content[0].text' response.json)

          echo "desc<<EOF" >> $GITHUB_OUTPUT
          echo "$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update PR description (safe mode)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const newContent = `## 🤖 Auto-generated summary\n\n${{ steps.claude.outputs.desc }}`;

            // Preserve manual content if exists
            let body = pr.body || "";

            const marker = "## 🤖 Auto-generated summary";

            if (body.includes(marker)) {
              // Replace existing generated section
              const updated = body.replace(
                new RegExp(`${marker}[\\s\\S]*`, 'm'),
                newContent
              );
              body = updated;
            } else {
              // Append to existing content
              body = body + "\n\n" + newContent;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: body
            });